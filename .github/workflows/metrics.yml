name: GitHub Metrics

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Overview stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: tchoteau
          template: classic
          base: header, repositories
          config_timezone: Europe/Paris
          filename: dist/metrics.overview.svg

      - name: Top languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: tchoteau
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          config_timezone: Europe/Paris
          filename: dist/metrics.languages.svg

      - name: Push metrics to metrics-output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: metrics-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
